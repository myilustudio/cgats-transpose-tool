<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CGATS Transpose Tool</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    textarea { width: 100%; height: 200px; margin-bottom: 10px; }
    button { padding: 10px 20px; margin-right: 10px; }
  </style>
</head>
<body>
  <h2>CGATS SAMPLE_NAME Swap Tool (A1 → 1A)</h2>

  <textarea id="input" placeholder="Paste CGATS content here..."></textarea>

  <div>
    <button onclick="processCGATS()">轉換</button>
    <button onclick="copyOutput()">複製結果</button>
    <button onclick="downloadOutput()">下載TXT</button>
  </div>

  <textarea id="output" placeholder="Result will appear here..."></textarea>

<script>
function swapSampleName(name) {
  // 解析像 A12 / B3
  const match = name.match(/^([A-Za-z]+)(\d+)$/);
  if (!match) return name;

  const letters = match[1];
  const numbers = match[2];

  return numbers + letters; // A1 → 1A
}

function processCGATS() {
  const input = document.getElementById('input').value;

  const beginMatch = input.match(/^BEGIN_DATA\s*$/m);
  const endMatch = input.match(/^END_DATA\s*$/m);

  if (!beginMatch || !endMatch) {
    alert('找不到 BEGIN_DATA 或 END_DATA');
    return;
  }

  const beginLineEnd = input.indexOf('\n', beginMatch.index);
  const endLineStart = endMatch.index;

  const before = input.substring(0, beginLineEnd + 1);
  const dataBlock = input.substring(beginLineEnd + 1, endLineStart).trim();
  const after = input.substring(endLineStart);

  const rows = dataBlock
    .split(/\r?\n/)
    .map(r => r.trim())
    .filter(r => r.length > 0);

  const processedRows = rows.map(row => {
    const cols = row.split(/\s+/);

    // 假設第一欄是 SAMPLE_NAME
    cols[0] = swapSampleName(cols[0]);

    return cols.join(' ');
  });

  const resultData = processedRows.join('\n');

  const result = before + resultData + '\n' + after;

  document.getElementById('output').value = result;
}

function copyOutput() {
  const output = document.getElementById('output');
  output.select();
  document.execCommand('copy');
  alert('已複製');
}

function downloadOutput() {
  const text = document.getElementById('output').value;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'converted.cgats.txt';
  a.click();
}
</script>

</body>
</html>
