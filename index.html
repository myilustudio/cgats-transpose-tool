<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CGATS Transpose Tool</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    textarea { width: 100%; height: 200px; margin-bottom: 10px; }
    button { padding: 10px 20px; margin-right: 10px; }
  </style>
</head>
<body>
  <h2>CGATS DATA Transpose Tool</h2>

  <textarea id="input" placeholder="Paste CGATS content here..."></textarea>

  <div>
    <button onclick="transposeCGATS()">轉置</button>
    <button onclick="copyOutput()">複製結果</button>
    <button onclick="downloadOutput()">下載TXT</button>
  </div>

  <textarea id="output" placeholder="Result will appear here..."></textarea>

<script>
function transpose(matrix) {
  return matrix[0].map((_, colIndex) => matrix.map(row => row[colIndex]));
}

function transposeCGATS() {
  const input = document.getElementById('input').value;

  // 精準匹配整行 BEGIN_DATA / END_DATA
  const beginMatch = input.match(/^BEGIN_DATA\s*$/m);
  const endMatch = input.match(/^END_DATA\s*$/m);

  if (!beginMatch || !endMatch) {
    alert('找不到 BEGIN_DATA 或 END_DATA');
    return;
  }

  // 找到 BEGIN_DATA 行結尾
  const beginLineEnd = input.indexOf('\n', beginMatch.index);
  const endLineStart = endMatch.index;

  // 分段
  const before = input.substring(0, beginLineEnd + 1);
  const dataBlock = input.substring(beginLineEnd + 1, endLineStart).trim();
  const after = input.substring(endLineStart);

  // 拆行
  const rows = dataBlock
    .split(/\r?\n/)
    .map(r => r.trim())
    .filter(r => r.length > 0);

  // 轉矩陣
  const matrix = rows.map(row => row.split(/\s+/));

  // 檢查矩陣是否規則
  const colCount = matrix[0].length;
  const isValid = matrix.every(row => row.length === colCount);

  if (!isValid) {
    alert('DATA 欄位長度不一致，無法轉置');
    return;
  }

  // 轉置
  const transposed = transpose(matrix);

  // 組回字串
  const resultData = transposed.map(row => row.join(' ')).join('\n');

  const result = before + resultData + '\n' + after;

  document.getElementById('output').value = result;
}

function copyOutput() {
  const output = document.getElementById('output');
  output.select();
  document.execCommand('copy');
  alert('已複製');
}

function downloadOutput() {
  const text = document.getElementById('output').value;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'transposed.cgats.txt';
  a.click();
}
</script>

</body>
</html>
