<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CGATS Grid Transpose Tool</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    textarea { width: 100%; height: 200px; margin-bottom: 10px; }
    button { padding: 10px 20px; margin-right: 10px; }
  </style>
</head>
<body>
  <h2>CGATS Grid Transpose (A1 → 1A + 重排)</h2>

  <textarea id="input" placeholder="Paste CGATS content here..."></textarea>

  <div>
    <button onclick="processCGATS()">轉換</button>
    <button onclick="copyOutput()">複製結果</button>
    <button onclick="downloadOutput()">下載TXT</button>
  </div>

  <textarea id="output" placeholder="Result will appear here..."></textarea>

<script>
function parseName(name) {
  const m = name.match(/^([A-Za-z]+)(\d+)$/);
  if (!m) return null;
  return { letter: m[1], number: parseInt(m[2], 10) };
}

function processCGATS() {
  const input = document.getElementById('input').value;

  const beginMatch = input.match(/^BEGIN_DATA\s*$/m);
  const endMatch = input.match(/^END_DATA\s*$/m);

  if (!beginMatch || !endMatch) {
    alert('找不到 BEGIN_DATA 或 END_DATA');
    return;
  }

  const beginLineEnd = input.indexOf('\n', beginMatch.index);
  const endLineStart = endMatch.index;

  const before = input.substring(0, beginLineEnd + 1);
  const dataBlock = input.substring(beginLineEnd + 1, endLineStart).trim();
  const after = input.substring(endLineStart);

  const rows = dataBlock.split(/\r?\n/).filter(r => r.trim().length > 0);

  // 解析並儲存
  const parsed = rows.map(row => {
    const cols = row.split('\t');
    const info = parseName(cols[0]);
    return { cols, info };
  });

  // 重新排序（數字優先，再字母）=> 轉置效果
  parsed.sort((a, b) => {
    if (!a.info || !b.info) return 0;

    if (a.info.number !== b.info.number) {
      return a.info.number - b.info.number;
    }
    return a.info.letter.localeCompare(b.info.letter);
  });

  // 轉換名稱 A1 → 1A
  const resultRows = parsed.map(item => {
    if (item.info) {
      item.cols[0] = item.info.number + item.info.letter;
    }
    return item.cols.join('\t');
  });

  const result = before + resultRows.join('\n') + '\n' + after;

  document.getElementById('output').value = result;
}

function copyOutput() {
  const text = document.getElementById('output').value;
  navigator.clipboard.writeText(text);
  alert('已複製');
}

function downloadOutput() {
  const text = document.getElementById('output').value;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'converted.cgats.txt';
  a.click();
}
</script>

</body>
</html>
