<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CGATS Grid Transpose Tool</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    textarea { width: 100%; height: 200px; margin-bottom: 10px; }
    button { padding: 10px 20px; margin-right: 10px; }
  </style>
</head>
<body>
  <h2>CGATS Grid Transpose (A1 → 1A + 重排)</h2>

  <textarea id="input" placeholder="Paste CGATS content here..."></textarea>

  <div>
    <button onclick="processCGATS()">轉換</button>
    <button onclick="copyOutput()">複製結果</button>
    <button onclick="downloadOutput()">下載TXT</button>
  </div>

  <textarea id="output" placeholder="Result will appear here..."></textarea>

<script>
function parseSampleName(name) {
  if (!name) return null;
  name = name.replace(/['\"]/g, '').trim();
  const match = name.match(/^([A-Za-z]+)(\d+)$/);
  if (!match) return null;
  return { letter: match[1].toUpperCase(), number: parseInt(match[2], 10) };
}

function processCGATS() {
  const input = document.getElementById('input').value;

  // 精確匹配 BEGIN_DATA 和 END_DATA (避免抓到其他類似標籤)
  const beginIndex = input.search(/^BEGIN_DATA\s*$/m);
  const endIndex = input.search(/^END_DATA\s*$/m);

  if (beginIndex === -1 || endIndex === -1 || endIndex <= beginIndex) {
    alert('找不到 BEGIN_DATA 或 END_DATA');
    return;
  }

  const before = input.substring(0, beginIndex + 'BEGIN_DATA'.length + 1);
  const dataBlock = input.substring(beginIndex + 'BEGIN_DATA'.length + 1, endIndex).trim();
  const after = input.substring(endIndex);

  // DATA 分行
  const rows = dataBlock.split(/\r?\n/).filter(r => r.trim().length > 0);

  const parsed = rows.map(row => {
    // 以 TAB + 任意空白分割
    const cols = row.split(/\t\s*/);
    // 第二欄是 SAMPLE_NAME
    const rawName = cols[1];
    const info = parseSampleName(rawName);
    return { cols, info };
  });

  // 排序：數字優先 → 英文
  parsed.sort((a, b) => {
    if (!a.info || !b.info) return 0;
    if (a.info.number !== b.info.number) {
      return a.info.number - b.info.number;
    }
    return a.info.letter.localeCompare(b.info.letter);
  });

  // 將 SAMPLE_NAME 轉成 數字+字母
  const resultRows = parsed.map(item => {
    if (item.info) {
      item.cols[1] = item.info.number + item.info.letter;
    }
    return item.cols.join('\t    '); // 保持 TAB+空白分隔
  });

  const result = before + '\n' + resultRows.join('\n') + '\n' + after;
  document.getElementById('output').value = result;
}

function copyOutput() {
  const text = document.getElementById('output').value;
  navigator.clipboard.writeText(text);
  alert('已複製');
}

function downloadOutput() {
  const text = document.getElementById('output').value;
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'converted.cgats.txt';
  a.click();
}
</script>

</body>
</html>
